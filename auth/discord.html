<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discord Login</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
  .card { display: inline-block; padding: 32px; border-radius: 16px; border: 1px solid #ddd; box-shadow: 0 8px 24px rgba(0,0,0,0.08); max-width: 420px; }
  button { padding: 12px 24px; border: none; border-radius: 8px; background: #5865F2; color: white; cursor: pointer; font-size: 16px; }
  button:hover { opacity: 0.95; }
  p { color: #444; }
</style>
</head>
<body>
  <div class="card">
    <h1>Discord Login</h1>
    <p>Click below to authenticate with Discord and open the AudioQuack dashboard.</p>
    <button id="login-btn">Login with Discord</button>
  </div>

<script>
  document.getElementById('login-btn').addEventListener('click', () => {
    window.location.href = '/auth/discord';
  });
</script>
</body>
</html>
