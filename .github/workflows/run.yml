name: Run AudioQuack + Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:

      # ✅ ARTIFACTS (your request)
      - name: Upload full project artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-project
          path: .

      - name: Upload minimal artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-core
          path: |
            index.js
            package.json
            .env

      # ✅ REQUIRED for GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./   # ⚠️ change to /public or /dist if you have a site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build:
    runs-on: ubuntu-latest
    environment: production

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
      DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
      DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
      ENABLE_SPOTIFY: "true"
      LAVALINK_HOST: "lavalink.jirayu.net"
      LAVALINK_PORT: "13592"
      LAVALINK_PASSWORD: "youshallnotpass"
      LAVALINK_SECURE: "false"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '21'

      - name: Install dependencies
        run: npm install @discordjs/voice@latest discord.js@latest erela.js@latest express@latest socket.io@latest express-session@latest passport@latest passport-discord@latest dotenv@latest cors@latest path@latest

      - name: Create .env file
        run: |
          cat > .env <<EOF
          DISCORD_TOKEN=${DISCORD_TOKEN}
          DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
          DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
          SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
          SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
          DASHBOARD_SECRET=${DASHBOARD_SECRET}
          CALLBACK_URL=${CALLBACK_URL}
          ENABLE_SPOTIFY=${ENABLE_SPOTIFY}
          LAVALINK_HOST=${LAVALINK_HOST}
          LAVALINK_PORT=${LAVALINK_PORT}
          LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
          LAVALINK_SECURE=${LAVALINK_SECURE}
          EOF

      - name: Run bot (short test)
        run: |
          node index.js &
          sleep 10
          echo "Bot test finished"
