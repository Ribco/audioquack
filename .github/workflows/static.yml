name: 🦆 Quacky Music Bot Deployer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 🐤
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies 🎵
        run: |
          echo "Quack! Installing all dependencies..."
          npm install

      - name: Build Bot (if needed) 🛠️
        run: |
          echo "Quack quack! Building..."
          npm run build || echo "No build step, skipping."

      - name: Run Music Bot 🎶
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PREFIX: "!"
        run: |
          echo "Starting the Quacky Music Bot... 🦆"
          node index.js

      - name: Done 🏁
        run: echo "All quacks deployed! Bot is live! 🐥"
